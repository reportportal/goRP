  /v1/{projectKey}/activity/item/{itemId}:
    get:
      description: |
        Fetches a list of item activities for a specific project.
        <p>Action field can have these values:</p>
        <ul>
        <li>'create'</li>
        <li>'update'</li>
        <li>'delete'</li>
        <li>'bulkCreate'</li>
        <li>'bulkUpdate'</li>
        <li>'bulkDelete'</li>
        <li>'analyze'</li>
