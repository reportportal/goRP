    get:
      description: "Get all users.  ### Export users  You can export users as a CSV\
        \ list to provide `Accept: text/csv`.  ### Authority  - `ADMINISTRATOR`"
      operationId: getUsers
      parameters:
      - description: Indicate response format. Use `text/csv` to export users.
        explode: false
        in: header
        name: Accept
        required: false
        schema:
          default: application/json
          type: string
        style: simple
      - description: Filter users by account type.
        explode: true
        in: query
        name: account_type
        required: false
        schema:
          enum:
          - INTERNAL
          - UPSA
          - GITHUB
          - LDAP
          - SAML
          - SCIM
          type: string
        style: form
      - description: Filter users by email.
        explode: true
        in: query
        name: email
        required: false
        schema:
          format: email
          type: string
        style: form
      - explode: true
        in: query
        name: exclude_fields
        required: false
        schema:
          type: string
        style: form
      - description: Filter users by  external id.
        explode: true
        in: query
        name: external_id
        required: false
        schema:
          type: string
        style: form
      - description: Filter users by full name containing (case insensitive).
        explode: true
        in: query
        name: full_name
        required: false
        schema:
          type: string
        style: form
      - description: Filter users by role.
        explode: true
        in: query
        name: instance_role
        required: false
        schema:
          enum:
          - ADMINISTRATOR
          - USER
          type: string
        style: form
      - description: The limit used for this page of results. This will be the same
          as the limit query parameter unless it exceeded the maximum value allowed
          for this API endpoint.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 300
          format: int32
          maximum: 1000
          minimum: 0
          type: integer
        style: form
      - description: The offset used for this page of results.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          type: integer
        style: form
      - description: Indicate sorting direction.
        explode: true
        in: query
        name: order
        required: false
        schema:
          default: ASC
          type: string
        style: form
      - description: Indicate sort by field.
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: full_name
          type: string
        style: form
      - description: Filter users by uuid.
        explode: true
        in: query
        name: uuid
        required: false
        schema:
          format: uuid
