version: '3'

vars:
  # Use Go instead of Unix `date` so Task works on Windows (see scripts/builddate.go).
  BUILD_DATE:
    sh: go run "{{.TASKFILE_DIR}}/scripts/builddate.go"
  GO: go
  BINARY_DIR: bin
  BUILD_INFO_LDFLAGS: -ldflags "-w -extldflags '"-static"' -X main.date={{.BUILD_DATE}} -X main.version={{.VERSION}}"
  GOLANG_CI: docker run --rm -v "{{.TASKFILE_DIR}}:/app" -w /app golangci/golangci-lint:v2.11.4 golangci-lint
  OUTPUT_DIR: "pkg/openapi"
  CLIENT_FILE: "{{.OUTPUT_DIR}}/client.go"
  # Canonical spec: JSON from https://demo.reportportal.io/api/v1/api-docs (OpenAPI 3.1; matches RP ~5.15.x)
  SPEC_PATH: "reportportal-api-docs.json"
  MODIFIED_SPEC_PATH: "openapi-modified.json"
  OPENAPI_GENERATOR_IMAGE: "openapitools/openapi-generator-cli:v7.21.0"

tasks:
  test:
    desc: Run Go tests with coverage
    cmds:
      - "{{.GO}} test -cover ./..."

  lint:
    desc: Run golangci-lint
    cmds:
      - "{{.GOLANG_CI}} run ./..."

  fmt:
    desc: Format code with golangci-lint
    cmds:
      - "{{.GO}} fmt ./..."
      - "{{.GOLANG_CI}} fmt ./..."

  build:
    desc: Build the Go binary
    cmds:
      - "{{.GO}} build {{.BUILD_INFO_LDFLAGS}} -o {{.BINARY_DIR}}/gorp ./"

  tag:
    desc: Create and push a git tag
    cmds:
      - git tag -a v{{.VERSION}} -m "creating tag {{.VERSION}}"
      - git push origin "refs/tags/v{{.VERSION}}"
    requires:
      vars: [ VERSION ]

  release:
    desc: Run goreleaser to create a release
    cmds:
      - go run "{{.TASKFILE_DIR}}/scripts/taskfs" remove dist
      - goreleaser release

  create-output-dir:
    desc: "Create output directory if it doesn't exist"
    cmds:
      - go run "{{.TASKFILE_DIR}}/scripts/taskfs" mkdir "{{.OUTPUT_DIR}}"
    status:
      - go run "{{.TASKFILE_DIR}}/scripts/taskfs" exists "{{.OUTPUT_DIR}}"

  clean:
    desc: "Remove binary, build, and generated OpenAPI client output"
    cmds:
      - go run "{{.TASKFILE_DIR}}/scripts/taskfs" remove "{{.OUTPUT_DIR}}"
      - go run "{{.TASKFILE_DIR}}/scripts/taskfs" remove "{{.BINARY_DIR}}"
      - go run "{{.TASKFILE_DIR}}/scripts/taskfs" remove build

 # Generate OpenAPI client code from the ReportPortal's OpenAPI schema
 # Note that not all additional properties are properly documented in the OpenAPI generator documentation
 # For instance, the `withCustomMiddlewareFunction` property is not documented, but can be found here:
 # https://github.com/OpenAPITools/openapi-generator/blob/v7.21.0/modules/openapi-generator/src/main/resources/go/configuration.mustache#L106C4-L106C32

  generate-openapi-client:
    deps: [ clean, create-output-dir ]
    desc: "Generate Go client from {{.MODIFIED_SPEC_PATH}} (refresh that file from {{.SPEC_PATH}} via task preprocess:schema)"
    cmds:
      - >-
        docker run --rm -v "{{.TASKFILE_DIR}}/{{.OUTPUT_DIR}}:/generated"
        -v "{{.TASKFILE_DIR}}/{{.MODIFIED_SPEC_PATH}}:/local/openapi.json" {{.OPENAPI_GENERATOR_IMAGE}} generate
        -i /local/openapi.json -g go -o /generated --package-name openapi
        --additional-properties=withGoCodegenComment=true,enumClassPrefix=true,onlyGenerateClient=true,withGoMod=false,withCustomMiddlewareFunction=true,useOneOfDiscriminatorLookup=true
        --git-repo-id gorp/v5/pkg/openapi --git-user-id reportportal
        --global-property modelDocs=false,apiDocs=false,apiTests=false

  # Default ReportPortal's OpenAPI schema needs to be preprocessed
  # due to incorrect map/dictionary type handling in the Golang OpenAPI generator
  # For the Java code containing type Map<String, Object> the following OpenAPI schema is generated:
  # {
  #   "type": "object",
  #   "additionalProperties": {
  #     "type": "object"
  #   }
  # }
  # Which results in a Go type of map[string]map[string]interface{} that
  # is not compatible with the ReportPortal's API responses, for instance:
  #     "metadata" : {
  #      "qualityGate" : {
  #        "id" : 415,
  #        "status" : "FAILED"
  #      },
  #      "rp.cluster.lastRun" : "1749732585366"
  #    },
  # The following JQ command converts mentioned types to:
  #  {
  #     "type": "object",
  #     "additionalProperties": true
  #  }
  # This allows the Go OpenAPI generator to create a map[string]interface{} type which accepts any JSON object
  preprocess:schema:
    desc: Normalize spec to JSON (yq), then JQ walk to fix Map<String,Object> types for Go codegen
    cmds:
      - go run "{{.TASKFILE_DIR}}/scripts/taskfs" nonempty "{{.TASKFILE_DIR}}/{{.SPEC_PATH}}"
      - |
        echo "Preprocessing {{.SPEC_PATH}} (normalize via yq, then JQ)..."
        docker run --rm -v "{{.TASKFILE_DIR}}:/workdir" -w /workdir mikefarah/yq:4 -o=json '.' "{{.SPEC_PATH}}" | docker run --rm -i -v "{{.TASKFILE_DIR}}:/workdir" ghcr.io/jqlang/jq -f /workdir/scripts/openapi-preprocess.jq > "{{.TASKFILE_DIR}}/{{.MODIFIED_SPEC_PATH}}"
        echo "Modified schema saved to {{.MODIFIED_SPEC_PATH}}"
