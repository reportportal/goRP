        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceUserPage"
